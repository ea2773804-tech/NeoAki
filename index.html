<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>NeoAki</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 15px;
    }

    .header {
      text-align: center;
      margin-top: 20px;
    }

    .header img {
      width: 140px;
    }

    .post-box {
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 5px;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #4a6cf7;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .post {
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .post img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>

</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <div class="header">
      <img src="logo.png" alt="NeoAki">
      <h1>NeoAki</h1>
    </div>

    <!-- CAIXA DE POST -->
    <div class="post-box">

      <input type="text" id="postInput" placeholder="O que você está pensando?">

      <input type="file" id="imageInput" accept="image/*">

      <button onclick="postar()">Postar</button>

    </div>

    <!-- FEED -->
    <div id="feed"></div>

  </div>

  <script type="module">
    function postar() {
      const texto = document.getElementById("postInput").value;
      const imagem = document.getElementById("imageInput").files[0];
      const feed = document.getElementById("feed");

      if (texto.trim() === "" && !imagem) return;

      const post = document.createElement("div");
      post.className = "post";

      let conteudo = "";

      if (texto.trim() !== "") {
        conteudo += `<p>${texto}</p>`;
      }

      if (imagem) {
        const url = URL.createObjectURL(imagem);
        conteudo += `<img src="${url}">`;
      }

      post.innerHTML = conteudo;

      feed.prepend(post);

      document.getElementById("postInput").value = "";
      document.getElementById("imageInput").value = "";
    }

    window.postar = postar;
  </script>

</body>
</html>
