<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NeoAki</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
  transition: 0.3s;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

/* HEADER */
.header {
  text-align: center;
  margin-top: 20px;
}

.header img {
  width: 140px;
}

/* POST BOX */
.post-box {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-top: 20px;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 5px;
}

input[type="file"] {
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #4a6cf7;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* POSTS */
.post {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

.post img {
  max-width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* BOTÃO DELETE */
.delete-btn {
  background: red;
}

/* 🌗 MODO ESCURO */
.dark {
  background: #121212;
  color: white;
}

.dark .post,
.dark .post-box {
  background: #1e1e1e;
  color: white;
}

.dark input {
  background: #2a2a2a;
  color: white;
  border: 1px solid #444;
}
</style>

</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="header">
  <img src="logo.png" alt="NeoAki">
  <h1>NeoAki</h1>

  <button onclick="toggleTheme()">🌗 Tema</button>
</div>

<!-- POST BOX -->
<div class="post-box">

  <input type="text" id="postInput" placeholder="O que você está pensando?">

  <input type="file" id="imageInput" accept="image/*">

  <button onclick="post()">Postar</button>

</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script>

function post() {
  const text = document.getElementById("postInput").value;
  const image = document.getElementById("imageInput").files[0];

  if (text.trim() === "" && !image) return;

  let imageData = null;

  if (image) {
    const reader = new FileReader();
    reader.onload = async function () {
      imageData = reader.result;

      await savePost(text, imageData);
    };
    reader.readAsDataURL(image);
  } else {
    savePost(text, null);
  }
}

async function savePost(text, image) {
  await addDoc(collection(db, "posts"), {
    text: text,
    image: image,
    time: new Date().toLocaleTimeString()
  });

  document.getElementById("postInput").value = "";
  document.getElementById("imageInput").value = "";
}
  const text = document.getElementById("postInput").value;
  const image = document.getElementById("imageInput").files[0];
  const feed = document.getElementById("feed");

  if (text.trim() === "" && !image) return;

  const post = document.createElement("div");
  post.className = "post";

  const time = new Date().toLocaleTimeString();

  let content = `
    <strong>Você</strong>
    <small style="color:gray;"> • ${time}</small>
    <br><br>
  `;

  if (text.trim() !== "") {
    content += `<p>${text}</p>`;
  }

  if (image) {
    const url = URL.createObjectURL(image);
    content += `<img src="${url}">`;
  }

  // 🗑️ DELETE POST (ÚNICA COISA QUE FALTAVA REALMENTE)
  content += `<br><button class="delete-btn" onclick="this.parentElement.remove()">🗑️ Apagar</button>`;

  post.innerHTML = content;

  feed.prepend(post);

  document.getElementById("postInput").value = "";
  document.getElementById("imageInput").value = "";
}

/* 🌗 THEME */
function toggleTheme() {
  document.body.classList.toggle("dark");
}

</script>

  }

  }
</script>

</html>
